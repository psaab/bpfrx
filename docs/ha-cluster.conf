groups {
    node0 {
        system {
            host-name bpfrx-fw0;
        }
        chassis {
            cluster {
                node 0;
                peer-address 10.99.0.2;
                fabric-peer-address 10.99.1.2;
                fabric1-peer-address 10.99.2.2;
            }
        }
        interfaces {
            fxp0 {
                unit 0 { family inet { dhcp; } }
            }
            em0 {
                unit 0 { family inet { address 10.99.0.1/30; } }
            }
            fab0 {
                unit 0 { family inet { address 10.99.1.1/30; } }
            }
            fab1 {
                unit 0 { family inet { address 10.99.2.1/30; } }
            }
            ge-0/0/2 {
                gigether-options { redundant-parent reth1; }
            }
            ge-0/0/3 {
                gigether-options { redundant-parent reth0; }
            }
        }
    }
    node1 {
        system {
            host-name bpfrx-fw1;
        }
        chassis {
            cluster {
                node 1;
                peer-address 10.99.0.1;
                fabric-peer-address 10.99.1.1;
                fabric1-peer-address 10.99.2.1;
            }
        }
        interfaces {
            fxp0 {
                unit 0 { family inet { dhcp; } }
            }
            em0 {
                unit 0 { family inet { address 10.99.0.2/30; } }
            }
            fab0 {
                unit 0 { family inet { address 10.99.1.2/30; } }
            }
            fab1 {
                unit 0 { family inet { address 10.99.2.2/30; } }
            }
            ge-7/0/2 {
                gigether-options { redundant-parent reth1; }
            }
            ge-7/0/3 {
                gigether-options { redundant-parent reth0; }
            }
        }
    }
}
apply-groups "${node}";
chassis {
    cluster {
        cluster-id 1;
        reth-count 2;
        heartbeat-interval 200;
        heartbeat-threshold 5;
        control-interface em0;
        configuration-synchronize;
        redundancy-group 0 {
            node 0 priority 200;
            node 1 priority 100;

        }
        redundancy-group 1 {
            node 0 priority 200;
            node 1 priority 100;

            gratuitous-arp-count 8;
            interface-monitor {
                ge-0/0/3 weight 255;
                ge-7/0/3 weight 255;
            }
        }
        redundancy-group 2 {
            node 0 priority 200;
            node 1 priority 100;

            gratuitous-arp-count 8;
            interface-monitor {
                ge-0/0/2 weight 255;
                ge-7/0/2 weight 255;
            }
        }
    }
}
interfaces {
    fab0 {
        fabric-options {
            member-interfaces {
                ge-0/0/0;
                ge-7/0/0;
            }
        }
    }
    fab1 {
        fabric-options {
            member-interfaces {
                ge-0/0/1;
                ge-7/0/1;
            }
        }
    }
    reth0 {
        redundant-ether-options { redundancy-group 1; }
        vlan-tagging;
        unit 50 {
            vlan-id 50;
            family inet { address 172.16.50.6/24; }
            family inet6 { address 2001:559:8585:50::6/64; }
        }
        unit 100 {
            vlan-id 100;
            family inet { address 172.16.100.6/24; }
            family inet6 { address 2001:559:8585:100::6/64; }
        }
    }
    reth1 {
        redundant-ether-options { redundancy-group 2; }
        unit 0 {
            family inet { address 10.0.60.1/24; }
            family inet6 { address 2001:559:8585:cf01::1/64; }
        }
    }
}
security {
    flow { allow-dns-reply; allow-embedded-icmp; }
    zones {
        security-zone mgmt {
            interfaces { fxp0; }
            host-inbound-traffic { system-services { ssh; ping; dhcp; } }
        }
        security-zone control {
            interfaces { em0; fab0; fab1; }
            host-inbound-traffic { system-services { all; } }
        }
        security-zone wan {
            interfaces { reth0.50; reth0.100; }
            host-inbound-traffic {
                system-services { ping; }
                protocols { router-discovery; }
            }
        }
        security-zone lan {
            interfaces { reth1; }
            host-inbound-traffic {
                system-services { ssh; ping; dhcp; dhcpv6; }
                protocols { router-discovery; }
            }
        }
    }
    policies {
        default-policy deny-all;
        from-zone lan to-zone wan {
            policy allow-all {
                match { source-address any; destination-address any; application any; }
                then { permit; log { session-init; session-close; } }
            }
        }
    }
    nat {
        source {
            rule-set lan-to-wan {
                from zone lan;
                to zone wan;
                rule snat {
                    match { source-address 0.0.0.0/0; }
                    then { source-nat { interface; } }
                }
                rule snat6 {
                    match { source-address ::/0; }
                    then { source-nat { interface; } }
                }
            }
        }
    }
}
protocols {
    router-advertisement {
        interface reth1 {
            managed-configuration;
            other-stateful-configuration;
            prefix 2001:559:8585:cf01::/64 {
                on-link;
                autonomous;
            }
            dns-server-address 2001:4860:4860::8888;
        }
    }
}
routing-options {
    static {
        route 0.0.0.0/0 { next-hop 172.16.50.1; }
        route ::/0 { next-hop 2001:559:8585:50::1; }
    }
}
system {
    services {
        dhcp-local-server {
            group lan-pool {
                interface reth1;
                pool lan-range {
                    subnet 10.0.60.0/24;
                    address-range low 10.0.60.100 high 10.0.60.199;
                    router 10.0.60.1;
                    dns-server 8.8.8.8;
                }
            }
        }
        dhcpv6-local-server {
            group lan6-pool {
                interface reth1;
                pool lan6-range {
                    subnet 2001:559:8585:cf01::/64;
                    address-range low 2001:559:8585:cf01::100 high 2001:559:8585:cf01::1ff;
                    dns-server 2001:4860:4860::8888;
                }
            }
        }
    }
}
